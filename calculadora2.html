<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Carteles Corpóreos</title>

<style>
body{
    margin:0;
    padding:0;
    background:#111;
    font-family:Arial, Helvetica, sans-serif;
    color:white;
}

.container{
    max-width:500px;
    margin:auto;
    padding:30px 20px;
}

h1{
    text-align:center;
    margin-bottom:30px;
    font-size:28px;
}

.card{
    background:#1d1d1d;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(255,255,255,0.08);
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:8px;
    font-size:16px;
}

input{
    width:100%;
    padding:14px;
    font-size:18px;
    border:none;
    border-radius:10px;
    outline:none;
}

button{
    width:100%;
    margin-top:25px;
    padding:15px;
    font-size:18px;
    font-weight:bold;
    background:#00c853;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#00e676;
}

.resultado{
    margin-top:25px;
    background:#000;
    padding:20px;
    border-radius:12px;
    line-height:1.8;
    font-size:18px;
}

.precio{
    color:#00ff99;
    font-size:28px;
    font-weight:bold;
}

small{
    color:#aaa;
}
</style>
</head>

<body>

<div class="container">

<h1>Calculadora Corpóreos</h1>

<div class="card">

<label>Ancho (cm)</label>
<input type="number" id="ancho" placeholder="Ej: 300">

<label>Alto (cm)</label>
<input type="number" id="alto" placeholder="Ej: 80">

<button onclick="calcular()">Calcular Precio</button>

<div class="resultado" id="resultado">
Ingresá medidas para calcular.
</div>

</div>
</div>

<script>
function calcular(){

let ancho = parseFloat(document.getElementById("ancho").value);
let alto = parseFloat(document.getElementById("alto").value);

if(!ancho || !alto){
    alert("Ingresá medidas válidas");
    return;
}

let anchoM = ancho / 100;
let altoM = alto / 100;

let area = anchoM * altoM;

// Fórmula acordada
let precio = (area * 500000) + 650000;

// mínimo
if(precio < 990000){
    precio = 990000;
}

// redondeo
precio = Math.round(precio / 10000) * 10000;

document.getElementById("resultado").innerHTML = `
<b>Medida:</b> ${ancho} cm x ${alto} cm<br>
<b>Área:</b> ${area.toFixed(2)} m²<br>
<b>Precio sugerido:</b><br>
<span class="precio">$${precio.toLocaleString("es-AR")}</span>
<br><small>*Valor orientativo</small>
`;

}
</script>

</body>
</html>
