<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>DeckLed - Calculadora</title>

<style>
body{
  margin:0;
  font-family:-apple-system,system-ui,Arial;
  background:#111;
  color:white;
}

.container{
  max-width:700px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  font-size:28px;
  margin-bottom:20px;
}

.card{
  background:#1d1d1d;
  padding:20px;
  border-radius:15px;
  margin-bottom:15px;
  box-shadow:0 0 20px rgba(255,255,255,0.08);
}

label{
  display:block;
  margin-top:12px;
  margin-bottom:6px;
}

input{
  width:100%;
  padding:13px;
  font-size:17px;
  border:none;
  border-radius:10px;
  box-sizing:border-box;
}

input[type="file"]{
  background:#2b5cff;
  color:white;
}

button{
  width:100%;
  margin-top:12px;
  padding:14px;
  font-size:17px;
  font-weight:bold;
  background:#00c853;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

button.secondary{
  background:#2b5cff;
}

button.dark{
  background:#333;
}

.resultado{
  margin-top:18px;
  background:#000;
  padding:18px;
  border-radius:12px;
  line-height:1.7;
  font-size:18px;
}

.precio{
  color:#00ff99;
  font-size:30px;
  font-weight:bold;
}

#canvas{
  width:100%;
  height:55vh;
  min-height:340px;
  max-height:70vh;
  background:#000;
  border-radius:12px;
  display:block;
  touch-action:none;
}

#hint{
  opacity:.85;
  font-size:13px;
  line-height:1.4;
}

#err{
  display:none;
  background:#ff3b30;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>DeckLed Calculadora</h1>

<div id="err"></div>

<div class="card">
  <h2>1) Medir con foto</h2>

  <label>Subir imagen</label>
  <input id="file" type="file" accept="image/*">

  <div id="hint">
    • Tocá 2 puntos para medir<br>
    • Primero calibrá con una medida real<br>
    • 2 dedos: zoom y mover imagen
  </div>

  <label>Medida real para calibrar (cm)</label>
  <input id="realValue" type="number" placeholder="Ej: 200">

  <button class="secondary" id="setScale">Guardar escala</button>
  <button class="dark" id="resetZoom">Reset zoom</button>

  <div class="resultado">
    <b>Medida detectada:</b>
    <div id="result">Subí una foto y tocá 2 puntos para calibrar.</div>
  </div>

  <button class="dark" id="resetPoints">Reset puntos</button>
</div>

<div class="card">
  <canvas id="canvas"></canvas>
</div>

<div class="card">
  <h2>2) Calcular precio</h2>

  <label>Ancho del cartel (cm)</label>
  <input type="number" id="ancho" placeholder="Ej: 300">

  <label>Alto del cartel (cm)</label>
  <input type="number" id="alto" placeholder="Ej: 80">

  <button onclick="calcularPrecio()">Calcular precio</button>

  <div class="resultado" id="resultadoPrecio">
    Ingresá ancho y alto para calcular.
  </div>
</div>

</div>

<script>
let ultimaMedidaCm = null;

function calcularPrecio(){
  let ancho = parseFloat(document.getElementById("ancho").value);
  let alto = parseFloat(document.getElementById("alto").value);

  if(!ancho || !alto){
    alert("Ingresá ancho y alto válidos");
    return;
  }

  let anchoM = ancho / 100;
  let altoM = alto / 100;
  let area = anchoM * altoM;

  let precio = (area * 500000) + 650000;

  if(precio < 990000){
    precio = 990000;
  }

  precio = Math.round(precio / 10000) * 10000;

  document.getElementById("resultadoPrecio").innerHTML = `
    <b>Medida:</b> ${ancho} cm x ${alto} cm<br>
    <b>Área:</b> ${area.toFixed(2)} m²<br>
    <b>Precio sugerido:</b><br>
    <span class="precio">$${precio.toLocaleString("es-AR")}</span>
    <br><small>*Valor orientativo</small>
  `;
}

(() => {
  const errBox = document.getElementById('err');

  function showErr(e){
    errBox.style.display = 'block';
    errBox.textContent = 'Error: ' + (e && e.message ? e.message : String(e));
  }

  try {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const fileInput = document.getElementById('file');
    const realInput = document.getElementById('realValue');
    const setScaleBtn = document.getElementById('setScale');
    const resetPointsBtn = document.getElementById('resetPoints');
    const resetZoomBtn = document.getElementById('resetZoom');
    const resultEl = document.getElementById('result');

    let img = new Image();
    let imgLoaded = false;

    let baseScale = 1;
    let baseOffX = 0;
    let baseOffY = 0;

    let zoom = 1;
    let panX = 0;
    let panY = 0;

    let p1 = null;
    let p2 = null;
    let cmPerPx = null;

    let lastCanvasWidth = 0;
    let lastCanvasHeight = 0;

    function resizeCanvas() {
      const r = canvas.getBoundingClientRect();
      const newWidth = Math.max(1, Math.round(r.width));
      const newHeight = Math.max(1, Math.round(r.height));

      if(imgLoaded && Math.abs(newWidth - lastCanvasWidth) < 5){
        return;
      }

      canvas.width = newWidth;
      canvas.height = newHeight;

      lastCanvasWidth = newWidth;
      lastCanvasHeight = newHeight;

      if(imgLoaded) fitImage(false);
      draw();
    }

    function fitImage(resetView = false) {
      const sx = canvas.width / img.width;
      const sy = canvas.height / img.height;

      baseScale = Math.min(sx, sy);

      const w = img.width * baseScale;
      const h = img.height * baseScale;

      baseOffX = (canvas.width - w) / 2;
      baseOffY = (canvas.height - h) / 2;

      if(resetView){
        zoom = 1;
        panX = 0;
        panY = 0;
      }
    }

    function currentScale(){
      return baseScale * zoom;
    }

    function imageRectOnCanvas(){
      const s = currentScale();

      return {
        x: baseOffX + panX,
        y: baseOffY + panY,
        w: img.width * s,
        h: img.height * s
      };
    }

    function insideImage(p){
      if(!imgLoaded) return false;

      const r = imageRectOnCanvas();

      return p.x >= r.x && p.x <= r.x + r.w && p.y >= r.y && p.y <= r.y + r.h;
    }

    function draw() {
      ctx.clearRect(0,0,canvas.width,canvas.height);

      if(!imgLoaded) return;

      const s = currentScale();

      ctx.drawImage(
        img,
        baseOffX + panX,
        baseOffY + panY,
        img.width * s,
        img.height * s
      );

      if(p1) drawPoint(p1);

      if(p1 && p2){
        drawPoint(p2);
        drawLine(p1,p2);
        showResult();
      }
    }

    function drawPoint(p){
      ctx.fillStyle = "#ffcc00";
      ctx.beginPath();
      ctx.arc(p.x,p.y,7,0,Math.PI*2);
      ctx.fill();
    }

    function drawLine(a,b){
      ctx.strokeStyle="#00c853";
      ctx.lineWidth=3;
      ctx.beginPath();
      ctx.moveTo(a.x,a.y);
      ctx.lineTo(b.x,b.y);
      ctx.stroke();
    }

    function dist(a,b){
      return Math.hypot(a.x-b.x, a.y-b.y);
    }

    function showResult(){
      if(!cmPerPx){
        resultEl.textContent = "Calibrá primero: marcá 2 puntos y tocá Guardar escala.";
        return;
      }

      const cm = dist(p1,p2) * cmPerPx;
      ultimaMedidaCm = cm;

      resultEl.innerHTML = `
        <span style="font-size:28px;color:#00ff99;font-weight:bold;">
          ${cm.toFixed(1)} cm
        </span>
        <br>
        <button onclick="usarComoAncho()">Usar como ancho</button>
        <button onclick="usarComoAlto()">Usar como alto</button>
      `;
    }

    window.usarComoAncho = function(){
      if(ultimaMedidaCm){
        document.getElementById("ancho").value = ultimaMedidaCm.toFixed(1);
      }
    }

    window.usarComoAlto = function(){
      if(ultimaMedidaCm){
        document.getElementById("alto").value = ultimaMedidaCm.toFixed(1);
      }
    }

    fileInput.addEventListener('change', () => {
      const f = fileInput.files && fileInput.files[0];

      if(!f) return;

      const reader = new FileReader();

      reader.onload = () => {
        const dataUrl = reader.result;
        const newImg = new Image();

        newImg.onload = () => {
          img = newImg;
          imgLoaded = true;

          p1 = null;
          p2 = null;
          cmPerPx = null;

          resultEl.textContent = "Imagen cargada. Tocá 2 puntos para calibrar.";

          const r = canvas.getBoundingClientRect();
          canvas.width = Math.max(1, Math.round(r.width));
          canvas.height = Math.max(1, Math.round(r.height));
          lastCanvasWidth = canvas.width;
          lastCanvasHeight = canvas.height;

          fitImage(true);
          draw();
        };

        newImg.onerror = () => showErr("No se pudo cargar la imagen.");
        newImg.src = dataUrl;
      };

      reader.onerror = () => showErr("FileReader falló.");
      reader.readAsDataURL(f);
    });

    canvas.addEventListener('click', (e) => {
      if(!imgLoaded) return;
      if(isPinching) return;

      const rect = canvas.getBoundingClientRect();

      const p = {
        x: e.clientX - rect.left,
        y: e.clientY - rect.top
      };

      if(!insideImage(p)) return;

      if(!p1){
        p1 = p;
      } else if(!p2){
        p2 = p;
      } else {
        p1 = p;
        p2 = null;
      }

      draw();
    });

    setScaleBtn.addEventListener('click', () => {
      if(!p1 || !p2){
        alert("Marcá 2 puntos sobre una medida conocida primero.");
        return;
      }

      const realCm = Number(realInput.value);

      if(!realCm || realCm <= 0){
        alert("Ingresá una medida real en cm. Ej: 200");
        return;
      }

      cmPerPx = realCm / dist(p1,p2);

      resultEl.textContent = "Escala guardada. Ahora medí tocando 2 puntos.";

      p1 = null;
      p2 = null;

      draw();
    });

    resetPointsBtn.addEventListener('click', () => {
      p1 = null;
      p2 = null;
      resultEl.textContent = "Puntos reseteados. Tocá 2 puntos.";
      draw();
    });

    resetZoomBtn.addEventListener('click', () => {
      zoom = 1;
      panX = 0;
      panY = 0;
      draw();
    });

    let isPinching = false;
    let lastDist = null;
    let lastCenter = null;

    function getDist(t1, t2) {
      return Math.hypot(
        t1.clientX - t2.clientX,
        t1.clientY - t2.clientY
      );
    }

    function getCenter(t1, t2) {
      return {
        x: (t1.clientX + t2.clientX) / 2,
        y: (t1.clientY + t2.clientY) / 2
      };
    }

    function clamp(v, min, max){
      return Math.max(min, Math.min(max, v));
    }

    canvas.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) {
        isPinching = true;
        lastDist = getDist(e.touches[0], e.touches[1]);
        lastCenter = getCenter(e.touches[0], e.touches[1]);
      }
    }, { passive: true });

    canvas.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2) {
        e.preventDefault();

        const distNow = getDist(e.touches[0], e.touches[1]);
        const centerNow = getCenter(e.touches[0], e.touches[1]);

        if (lastCenter) {
          panX += centerNow.x - lastCenter.x;
          panY += centerNow.y - lastCenter.y;
        }

        if (lastDist) {
          const factor = distNow / lastDist;

          const rect = canvas.getBoundingClientRect();
          const cx = centerNow.x - rect.left;
          const cy = centerNow.y - rect.top;

          const prevScale = currentScale();

          zoom = clamp(zoom * factor, 1, 6);

          const newScale = currentScale();

          panX += (cx - (baseOffX + panX)) * (1 - newScale / prevScale);
          panY += (cy - (baseOffY + panY)) * (1 - newScale / prevScale);
        }

        lastDist = distNow;
        lastCenter = centerNow;

        draw();
      }
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => {
      if (e.touches.length < 2) {
        lastDist = null;
        lastCenter = null;

        setTimeout(() => {
          isPinching = false;
        }, 80);
      }
    });

    window.addEventListener('resize', resizeCanvas);

    resizeCanvas();

  } catch(e){
    showErr(e);
  }
})();
</script>

</body>
</html>
