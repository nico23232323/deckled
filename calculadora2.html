<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DeckLed</title>

<style>
body{margin:0;background:#101010;color:#fff;font-family:-apple-system}
.app{max-width:700px;margin:auto;padding:10px}
.card{background:#1b1b1b;border-radius:12px;padding:10px;margin-bottom:8px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
input,button,textarea{width:100%;border:none;border-radius:8px;padding:10px;font-size:14px}
input{background:#fff;color:#000}
button{background:#00c853;color:#fff;font-weight:bold}
button.blue{background:#2b5cff}
button.dark{background:#333}
textarea{height:180px;margin-top:6px}
#canvas{width:100%;height:55vh;background:#000;border-radius:10px}
.result{text-align:center;background:#000;border-radius:10px;padding:10px;margin-top:6px}
.precio{font-size:30px;color:#00ff99;font-weight:bold}
.medida{font-size:28px;color:#00ff99;font-weight:bold}
.mini{font-size:12px;opacity:.7}
</style>
</head>

<body>
<div class="app">

<div class="card">
<div class="row">
<input id="file" type="file">
<input id="realValue" placeholder="Escala cm">
</div>
<div class="row">
<button class="blue" id="setScale">Escala</button>
<button class="dark" id="resetZoom">Zoom</button>
</div>
</div>

<div class="card">
<canvas id="canvas"></canvas>
<div class="result" id="result">Subí foto</div>
<div class="row">
<button class="dark" id="resetPoints">Reset</button>
<button class="dark" onclick="limpiar()">Limpiar</button>
</div>
</div>

<div class="card">
<div class="row">
<input id="ancho" placeholder="Ancho">
<input id="alto" placeholder="Alto">
</div>

<button onclick="calcular()">Calcular</button>

<div id="precio" class="result"></div>

<button class="blue" onclick="copiar()">Copiar WhatsApp</button>
<textarea id="txt"></textarea>
</div>

</div>

<script>
let precioPixel=0,precioMono=0;

// ===== CALCULO PRO =====
function calcular(){
let a=parseFloat(ancho.value);
let b=parseFloat(alto.value);
if(!a||!b)return alert("Ingresá medidas");

let area=(a/100)*(b/100);
let tipo;

// CURVA AJUSTADA
if(area<=0.7){
tipo="Chico";
precioPixel=area*1200000+390000;
}
else if(area<=2){
tipo="Mediano";
precioPixel=area*900000+400000;
}
else{
tipo="Grande";
precioPixel=area*500000+650000;
}

precioPixel=Math.round(precioPixel/10000)*10000;
precioMono=Math.round((precioPixel/1.1)/10000)*10000;

precio.innerHTML=`
<div class="mini">${tipo}</div>
<div class="mini">Blanco</div>
<div class="precio">$${precioMono.toLocaleString()}</div>
<div class="mini">Pixel LED</div>
<div class="precio">$${precioPixel.toLocaleString()}</div>
<div class="mini">${a} x ${b} · ${area.toFixed(2)} m²</div>
`;

txt.value=`❗️ En blanco frío o color fijo el valor es $${precioMono.toLocaleString()}

✅ En pixel led con control app celular el valor es $${precioPixel.toLocaleString()}

💳 Con una seña del 30% ya tomamos el pedido

🪧Los carteles se realizan en impresión 3d, frente de acrílico blanco, con luz interna led y estructura de hierro para facilitar montaje.

▶️ Instagram
https://www.instagram.com/corporeos.deckled

▶️ Catálogo
https://drive.google.com/file/d/1CTRkwK4GmFa_YNUKb2A2njCBEleL1TmC/view
`;
}

function copiar(){
txt.select();
document.execCommand("copy");
alert("Copiado");
}

function limpiar(){
ancho.value="";
alto.value="";
precio.innerHTML="";
txt.value="";
}

// ===== MEDIDOR SIMPLE =====
let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");
let img=new Image(),p1=null,p2=null,cmPerPx=null;

file.onchange=e=>{
let r=new FileReader();
r.onload=()=>{
img.onload=()=>{draw();};
img.src=r.result;
};
r.readAsDataURL(e.target.files[0]);
};

canvas.onclick=e=>{
let rect=canvas.getBoundingClientRect();
let p={x:e.clientX-rect.left,y:e.clientY-rect.top};
if(!p1)p1=p; else if(!p2)p2=p; else{p1=p;p2=null;}
draw();
};

setScale.onclick=()=>{
if(!p1||!p2)return alert("Marcá 2 puntos");
let real=parseFloat(realValue.value);
if(!real)return alert("Escala");
cmPerPx=real/dist(p1,p2);
p1=p2=null;
draw();
};

resetPoints.onclick=()=>{p1=p2=null;draw();};

function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.drawImage(img,0,0,canvas.width,canvas.height);
if(p1)point(p1);
if(p1&&p2){
point(p2);
line(p1,p2);
if(cmPerPx){
let cm=dist(p1,p2)*cmPerPx;
result.innerHTML=`<div class="medida">${cm.toFixed(1)} cm</div>
<button onclick="ancho.value=${cm.toFixed(1)}">Ancho</button>
<button onclick="alto.value=${cm.toFixed(1)}">Alto</button>`;
}
}
}

function point(p){ctx.fillStyle="#ff0";ctx.beginPath();ctx.arc(p.x,p.y,5,0,6.28);ctx.fill();}
function line(a,b){ctx.strokeStyle="#0f0";ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}
</script>

</body>
</html>
